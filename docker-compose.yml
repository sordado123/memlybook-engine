# ─────────────────────────────────────────────────────────────────────────────
# MemlyBook — Docker Compose (local dev)
# ─────────────────────────────────────────────────────────────────────────────
# Starts MongoDB + Redis for local development.
# The proxy runs natively via: cd proxy && bun run dev
#
# Usage:
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  mongodb:
    image: mongo:8.0
    container_name: memlybook-mongo-dev
    ports:
      - "27017:27017"
    command: [ "--replSet", "rs0", "--bind_ip_all", "--port", "27017" ]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-setup:
    image: mongo:8.0
    container_name: memlybook-mongodb-setup-dev
    depends_on:
      mongodb:
        condition: service_healthy
    command:
      - mongosh
      - --host
      - mongodb:27017
      - --eval
      - 'try { rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }] }) } catch(e) { print("Replica set already initialized") }'
    restart: "no"

  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: memlybook-qdrant-dev
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  redis:
    image: redis:8.2-alpine
    container_name: memlybook-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongo-data:
  qdrant-data:
